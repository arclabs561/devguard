name: guardian-self-scan

on:
  pull_request:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *" # daily 06:00 UTC

permissions:
  contents: read

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog (verified + unknown)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: >-
            --results=verified,unknown
            --no-update
